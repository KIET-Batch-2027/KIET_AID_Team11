<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="AI Interview Trainer - Practice interviews with AI feedback">
    <meta name="author" content="AI Interview Trainer">

    <title>AI Interview Trainer</title>

    <!-- FAVICON -->
    <link rel="icon" href="{{ url_for('static', filename='favicon.ico') }}">

    <!-- ================= CORE STYLES ================= -->
    <!-- Cache busting -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}?v=3">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/chat.css') }}?v=1">

    <!-- ================= CORE SCRIPTS ================= -->
    <script defer src="{{ url_for('static', filename='js/time.js') }}"></script>
    <style>
        /* simple toast styles */
        #toasts { position: fixed; top: 16px; right: 16px; z-index: 9999; }
        .toast { background: rgba(0,0,0,0.85); color: #fff; padding: 12px 16px; border-radius: 8px; margin-bottom: 8px; box-shadow: 0 6px 18px rgba(0,0,0,0.2); }
        .toast-success { background: #16a34a; }
        .toast-error { background: #dc2626; }
    </style>
</head>

<body id="app-body">

<div class="app-container">

    <!-- ================= SIDEBAR ================= -->
    <aside class="sidebar">

        <div>
            <div class="sidebar-header">
                <h1 data-i18n="nav.app_title">AI Interview</h1>
                <p class="subtitle" data-i18n="nav.subtitle">Professional Trainer</p>
            </div>

            <nav class="sidebar-menu">
                <a href="/dashboard"
                   class="nav-link {% if request.path.startswith('/dashboard') %}active{% endif %}"
                   data-i18n="nav.dashboard">Dashboard</a>

                <a href="/interview"
                   class="nav-link {% if request.path.startswith('/interview') %}active{% endif %}"
                   data-i18n="nav.interview">Interview</a>

                <a href="/records"
                   class="nav-link {% if request.path.startswith('/records') %}active{% endif %}"
                   data-i18n="nav.records">Records</a>

                <a href="/settings"
                   class="nav-link {% if request.path.startswith('/settings') %}active{% endif %}"
                   data-i18n="nav.settings">Settings</a>

                <a href="/help"
                   class="nav-link {% if request.path.startswith('/help') %}active{% endif %}"
                   data-i18n="nav.help">Help</a>
            </nav>
        </div>

        <div class="sidebar-footer">
            <form id="logoutForm" method="post" action="/logout" style="display:inline;width:100%">
                <input type="hidden" name="csrf_token" value="{{ session.csrf_token }}">
                <button type="submit" class="logout-btn" data-i18n="nav.logout">Logout</button>
            </form>
        </div>

    </aside>

    <!-- ================= MAIN SECTION ================= -->
    <div class="main-section">

        <header class="topbar">
            <div class="welcome-text">
                <h2 data-i18n="top.welcome_back">Welcome back</h2>
                <span id="clock"></span>
            </div>
            <div style="margin-left:auto;display:flex;align-items:center;gap:8px">
                <label for="langSelect" style="font-size:14px;margin-right:6px" data-i18n="nav.language">Language</label>
                <select id="langSelect" style="padding:6px;border-radius:6px;border:1px solid #ddd">
                    <option value="en">English</option>
                    <option value="bho">भोजपुरी</option>
                    <option value="mai">मैथिली</option>
                </select>
            </div>
        </header>

        <!-- Flash / Toast messages -->
        <div id="toasts" aria-live="polite" aria-atomic="true">
            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, msg in messages %}
                        <div class="toast toast-{{ category }}">{{ msg }}</div>
                    {% endfor %}
                {% endif %}
            {% endwith %}
        </div>

        <main class="page-content fade-in">
            {% block content %}{% endblock %}
        </main>

    </div>

</div>
<script>
    // auto-hide toasts
    setTimeout(()=>{
        document.querySelectorAll('#toasts .toast').forEach(t=>t.remove());
    }, 3500);
</script>

<!-- translation system -->
<script src="{{ url_for('static', filename='js/translator.js') }}"></script>
<!-- chat.js is included only on pages that need the chat (e.g. interview.html) to avoid duplicate init errors -->

</body>
</html>
