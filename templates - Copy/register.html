<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | AI Interview Trainer</title>

    <!-- CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/dark.css') }}">

    <style>
        /* ================= BODY & ROOT ================= */
        body {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #FFDAB9, #FFE5B4); /* Warm Peach + Apricot */
            font-family: 'Inter', sans-serif;
            margin: 0;
        }

        /* ================= REGISTER WRAPPER ================= */
        .register-wrapper {
            width: 100%;
            max-width: 480px;
            animation: fadeUp 0.9s ease;
        }

        /* ================= REGISTER CARD ================= */
        .register-card {
            background: #fff;
            padding: 45px;
            border-radius: 22px;
            box-shadow: 0 25px 60px rgba(0,0,0,0.2);
            position: relative;
            overflow: hidden;
            transform: translateY(0);
            transition: transform 0.4s ease, box-shadow 0.4s ease;
        }

        .register-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 35px 80px rgba(0,0,0,0.25);
        }

        /* ================= HEADER ================= */
        .register-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .register-header h1 {
            font-size: 32px;
            margin-bottom: 8px;
            background: linear-gradient(45deg, #FF8C42, #FFC37A);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            position: relative;
            overflow: hidden;
        }

        /* Light sweep animation for heading */
        .register-header h1::after {
            content: '';
            position: absolute;
            top: 0;
            left: -75%;
            width: 50%;
            height: 100%;
            background: rgba(255,255,255,0.4);
            transform: skewX(-25deg);
            transition: all 0.7s ease;
        }

        .register-header h1:hover::after {
            left: 125%;
        }

        .register-header p {
            color: #475569;
        }

        /* ================= FORM ================= */
        .form-row {
            display: flex;
            gap: 15px;
        }

        .form-group {
            margin-bottom: 20px;
            flex: 1;
        }

        .form-group label {
            display: block;
            margin-bottom: 6px;
            font-weight: 600;
        }

        .form-group input {
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            border: 1px solid #F0C987;
            font-size: 15px;
            outline: none;
            transition: all 0.3s ease;
        }

        .form-group input:focus {
            border-color: #FF8C42;
            box-shadow: 0 0 8px rgba(255,140,66,0.3);
        }

        /* ================= BUTTON ================= */
        .register-btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 14px;
            background: linear-gradient(to right, #FF8C42, #FFC37A);
            color: #fff;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            margin-top: 10px;
            transition: all 0.3s ease;
        }

        /* Pulse effect */
        .register-btn::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: rgba(255,255,255,0.2);
            border-radius: 50%;
            transform: scale(0);
            transition: transform 0.5s ease;
        }

        .register-btn:hover::after {
            transform: scale(1);
        }

        .register-btn:hover {
            box-shadow: 0 8px 25px rgba(255,140,66,0.4);
        }

        /* ================= ERROR ================= */
        .error {
            color: #FF4C4C;
            text-align: center;
            margin-bottom: 10px;
            font-weight: 600;
        }

        /* ================= LINKS ================= */
        .register-card a {
            color: #FF8C42;
            text-decoration: none;
            font-weight: 600;
            position: relative;
        }

        /* Gold dot active indicator */
        .register-card a::after {
            content: '';
            display: inline-block;
            width: 8px;
            height: 8px;
            background: #FFD700; /* Soft gold */
            border-radius: 50%;
            margin-left: 6px;
            vertical-align: middle;
            animation: pulseDot 1.5s infinite;
        }

        @keyframes pulseDot {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.5); opacity: 0.6; }
        }

        /* ================= ANIMATION ================= */
        @keyframes fadeUp {
            0% { opacity: 0; transform: translateY(30px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        /* Responsive */
        @media screen and (max-width: 500px){
            .register-card { padding: 30px; }
            .form-row { flex-direction: column; }
        }
    </style>
</head>

<body>
<div class="register-wrapper">
    <div class="register-card">

        <div class="register-header">
            <h1>Create Account</h1>
            <p>Join AI Interview Trainer</p>
        </div>

        {% if error %}
            <div class="error">{{ error }}</div>
        {% endif %}

        <form method="post" action="/register">
            <input type="hidden" name="csrf_token" value="{{ session.csrf_token }}">
            <input type="hidden" name="name" id="full_name">

            <div class="form-row">
                <div class="form-group">
                    <label>First Name</label>
                    <input type="text" id="first_name" placeholder="First name" required>
                </div>

                <div class="form-group">
                    <label>Last Name</label>
                    <input type="text" id="last_name" placeholder="Last name" required>
                </div>
            </div>

            <div class="form-group">
                <label>Email Address</label>
                <input type="email" name="email" placeholder="Enter your email" required>
            </div>

            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" id="password" required>
            </div>

            <div class="form-group">
                <label>Confirm Password</label>
                <input type="password" name="confirm_password" id="confirm_password" required>
            </div>

            <button type="submit" class="register-btn">
                📝 Create Account
            </button>

        </form>

        <div style="text-align:center;margin-top:15px;">
            Already have an account? <a href="/login">Login here</a>
        </div>

    </div>
</div>

<script>
    const form = document.querySelector("form");

    form.addEventListener("submit", function (e) {
        const first = document.getElementById("first_name").value.trim();
        const last = document.getElementById("last_name").value.trim();
        const pass = document.getElementById("password").value;
        const confirm = document.getElementById("confirm_password").value;

        if (pass !== confirm) {
            alert("Passwords do not match!");
            e.preventDefault();
            return;
        }

        document.getElementById("full_name").value = first + " " + last;
    });
</script>
</body>
</html>
