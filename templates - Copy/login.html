<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login | AI Interview Trainer</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/dark.css') }}">

    <style>
        /* ================= BODY & ROOT ================= */
        body {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #FFDAB9, #FFE5B4); /* Warm Peach + Apricot */
            font-family: 'Inter', sans-serif;
            margin: 0;
        }

        /* ================= LOGIN CARD ================= */
        .login-card {
            width: 380px;
            background: #fff;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.2);
            position: relative;
            overflow: hidden;
            transform: translateY(0);
            transition: transform 0.4s ease, box-shadow 0.4s ease;
        }

        .login-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 25px 60px rgba(0,0,0,0.25);
        }

        /* ================= HEADING ================= */
        h2 {
            text-align: center;
            margin-bottom: 25px;
            font-size: 28px;
            background: linear-gradient(45deg, #FF8C42, #FFC37A);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            position: relative;
            overflow: hidden;
        }

        /* Light sweep animation for heading */
        h2::after {
            content: '';
            position: absolute;
            top: 0;
            left: -75%;
            width: 50%;
            height: 100%;
            background: rgba(255,255,255,0.4);
            transform: skewX(-25deg);
            transition: all 0.7s ease;
        }

        h2:hover::after {
            left: 125%;
        }

        /* ================= FORM GROUP ================= */
        .group {
            margin-bottom: 18px;
        }

        input {
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            border: 1px solid #F0C987;
            outline: none;
            font-size: 15px;
            transition: all 0.3s ease;
        }

        input:focus {
            border-color: #FF8C42;
            box-shadow: 0 0 8px rgba(255,140,66,0.3);
        }

        /* ================= BUTTON ================= */
        button {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(to right, #FF8C42, #FFC37A);
            color: #fff;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        /* Pulse effect */
        button::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: rgba(255,255,255,0.2);
            border-radius: 50%;
            transform: scale(0);
            transition: transform 0.5s ease;
        }

        button:hover::after {
            transform: scale(1);
        }

        button:hover {
            box-shadow: 0 8px 25px rgba(255,140,66,0.4);
        }

        /* ================= ERROR ================= */
        .error {
            color: #FF4C4C;
            text-align: center;
            margin-bottom: 10px;
            font-weight: 600;
        }

        /* ================= REGISTER LINK ================= */
        p {
            text-align: center;
            margin-top: 15px;
            font-size: 14px;
        }

        p a {
            color: #FF8C42;
            text-decoration: none;
            font-weight: 600;
            position: relative;
        }

        /* Gold dot active indicator for language/menu example */
        p a::after {
            content: '';
            display: inline-block;
            width: 8px;
            height: 8px;
            background: #FFD700; /* Soft gold */
            border-radius: 50%;
            margin-left: 6px;
            vertical-align: middle;
            animation: pulseDot 1.5s infinite;
        }

        @keyframes pulseDot {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.5); opacity: 0.6; }
        }

        /* ================= ANIMATION ================= */
        @keyframes fadeUp {
            0% { opacity: 0; transform: translateY(30px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        /* Responsive */
        @media screen and (max-width: 480px){
            .login-card { width: 90%; padding: 30px; }
        }
    </style>
</head>

<body>
<div class="login-card">
    <h2>Login</h2>

    {% if error %}
        <div class="error">{{ error }}</div>
    {% endif %}

    <form method="post">
        <input type="hidden" name="csrf_token" value="{{ session.csrf_token }}">
        <div class="group">
            <input type="email" name="email" placeholder="Email" required>
        </div>

        <div class="group">
            <input type="password" name="password" placeholder="Password" required>
        </div>

        <button type="submit">Login</button>
    </form>

    <p>
        New user? <a href="/register">Register</a>
    </p>
</div>
</body>
</html>
